     1|name: Version Check
     2|
     3|on:
     4|  push:
     5|    tags:
     6|      - 'v*'
     7|
     8|jobs:
     9|  check-version:
    10|    name: Verify tag matches version
    11|    runs-on: ubuntu-latest
    12|
    13|    steps:
    14|      - name: Checkout code
    15|        uses: actions/checkout@v4
    16|
    17|      - name: Set up Python
    18|        uses: actions/setup-python@v5
    19|        with:
    20|          python-version: '3.11'
    21|
    22|      - name: Check version matches tag
    23|        run: |
    24|          TAG_VERSION=${GITHUB_REF#refs/tags/v}
    25|          echo "Tag version: $TAG_VERSION"
    26|          PACKAGE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
    27|          echo "Package version: $PACKAGE_VERSION"
    28|          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
    29|            echo "ERROR: Tag version ($TAG_VERSION) does not match package version ($PACKAGE_VERSION)"
    30|            exit 1
    31|          fi
    32|          echo "✅ Version check passed: $TAG_VERSION == $PACKAGE_VERSION"
    33|
    34|      - name: Verify changelog entry
    35|        run: |
    36|          TAG_VERSION=${GITHUB_REF#refs/tags/v}
    37|          if ! grep -q "## \[$TAG_VERSION\]" CHANGELOG.md; then
    38|            echo "⚠️ Warning: No changelog entry found for version $TAG_VERSION"
    39|            echo "Please add a changelog entry before releasing."
    40|          else
    41|            echo "✅ Changelog entry found for version $TAG_VERSION"
    42|          fi